name: Build MusicRPC

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f dist/main.js ]; then
            echo "Build output missing: dist/main.js";
            exit 1;
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: musicrpc-dist
          path: dist

  package:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm install

      - name: Package Windows installer
        run: npm run package

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: musicrpc-installer
          path: release/*.exe
